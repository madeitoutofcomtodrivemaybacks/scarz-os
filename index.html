<!DOCTYPE html>
<html>
<head>
  <title>Scarz OS</title>
  <style>
    body { margin:0; background:black; color:white; font-family:Arial; overflow:hidden; }

    /* Boot animation */
    #bootAnimation { position:fixed; top:0; left:0; width:100%; height:100%; background:black; display:flex; justify-content:center; align-items:center; flex-direction:column; z-index:2000; }
    #bootAnimation img { width:200px; height:200px; object-fit:contain; }
    #bootAnimation p { color:white; margin-top:20px; font-size:24px; }

    /* Lock screen */
    #lockScreen { position:fixed; top:0; left:0; width:100%; height:100%; background:linear-gradient(180deg, #111 0%, #000 100%); display:none; flex-direction:column; justify-content:center; align-items:center; z-index:3000; backdrop-filter: blur(2px); }
    #lockScreen #lockTime { font-size:80px; font-weight:200; letter-spacing:3px; }
    #lockScreen #lockDate { font-size:22px; opacity:0.6; letter-spacing:2px; margin-bottom:30px; }
    #lockScreen input { padding:10px; font-size:18px; border-radius:6px; border:none; width:200px; text-align:center; margin-top:10px; }
    #lockScreen button { margin-top:10px; padding:10px 20px; font-size:16px; cursor:pointer; border:none; border-radius:6px; background:#444; color:white; }
    #lockScreen p { color:red; margin-top:10px; font-size:14px; display:none; }

    /* MOND Clock */
    #clock { position:absolute; top:40%; left:50%; transform:translate(-50%,-50%); text-align:center; }
    #time { font-size:100px; font-weight:200; letter-spacing:5px; }
    #date { font-size:20px; opacity:0.6; letter-spacing:3px; }

    /* Taskbar */
    #taskbar { position:fixed; bottom:10px; left:50%; transform:translateX(-50%); width:60%; height:60px; border-radius:20px; backdrop-filter: blur(20px); background: rgba(255,255,255,0.08); }
    #taskbar-icons { position:absolute; left:50%; transform:translateX(-50%); }
    #taskbar-icons img { width:40px; margin:10px; cursor:pointer; }

    /* Windows */
    .window { position:absolute; top:80px; left:100px; width:70%; height:70%; background:#111; border-radius:12px; display:flex; flex-direction:column; }
    .window-bar { background:#000; padding:10px; display:flex; justify-content:space-between; }
    iframe { flex:1; border:none; }

    /* Android launcher with scrollable pages */
    #androidLauncherContainer { overflow-x:auto; scroll-snap-type:x mandatory; display:flex; height:100%; padding:10px; }
    .androidPage { flex:none; width:100%; display:grid; grid-template-columns:repeat(4,1fr); gap:20px; scroll-snap-align:start; padding:20px; }
    .app { text-align:center; cursor:pointer; }
    .app img { width:60px; }

    /* Spotify widget */
    #spotifyWidget { position:absolute; top:10px; right:10px; width:300px; height:380px; background:#111; border-radius:12px; overflow:hidden; }

    /* Browser search */
    #searchBar { padding:10px; font-size:16px; border:none; width:100%; }

  </style>
</head>
<body>

<!-- Boot Animation -->
<div id="bootAnimation">
  <img id="bootLogo" src="">
  <p id="bootText"></p>
</div>

<!-- Lock Screen -->
<div id="lockScreen">
  <div id="lockTime"></div>
  <div id="lockDate"></div>
  <input id="passwordInput" type="password" placeholder="Password">
  <button onclick="checkPassword()">Unlock</button>
  <p id="wrongPassword">Wrong password. Try again!</p>
</div>

<!-- Desktop -->
<div id="desktop" style="display:none;">

  <!-- Clock -->
  <div id="clock">
    <div id="time"></div>
    <div id="date"></div>
  </div>

  <!-- Browser -->
  <div id="browserWindow" class="window" style="display:none;">
    <div class="window-bar">
      <span>Browser</span>
      <button onclick="closeBrowser()">X</button>
    </div>
    <input id="searchBar" type="text" placeholder="Search or type URL">
    <iframe id="browserFrame"></iframe>
  </div>

  <!-- Android Launcher -->
  <div id="androidWindow" class="window" style="display:none;">
    <div class="window-bar">
      <span>Android</span>
      <button onclick="closeAndroid()">X</button>
    </div>
    <div id="androidLauncherContainer">
      <!-- Page 1 -->
      <div class="androidPage">
        <div class="app" onclick="openApp('https://www.roblox.com')"><img src="https://cdn-icons-png.flaticon.com/512/5968/5968705.png"><p>Roblox</p></div>
        <div class="app" onclick="openApp('https://www.tiktok.com')"><img src="https://cdn-icons-png.flaticon.com/512/3046/3046121.png"><p>TikTok</p></div>
        <div class="app" onclick="openApp('https://www.youtube.com')"><img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png"><p>YouTube</p></div>
        <div class="app" onclick="openApp('https://discord.com')"><img src="https://cdn-icons-png.flaticon.com/512/2111/2111370.png"><p>Discord</p></div>
        <div class="app" onclick="openApp('https://chat.openai.com')"><img src="https://cdn-icons-png.flaticon.com/512/4712/4712109.png"><p>ChatGPT</p></div>
        <div class="app" onclick="openApp('https://duckmath.org')"><img src="https://cdn-icons-png.flaticon.com/512/906/906175.png"><p>Games</p></div>
        <div class="app" onclick="openApp('https://www.netflix.com/browse')"><img src="https://cdn-icons-png.flaticon.com/512/732/732228.png"><p>Netflix</p></div>
        <div class="app" onclick="openApp('https://www.coolmathgames.com')"><img src="https://cdn-icons-png.flaticon.com/512/187/187873.png"><p>CoolMath</p></div>
      </div>
      <!-- Page 2 -->
      <div class="androidPage">
        <div class="app" onclick="openApp('https://unblocked.games')"><img src="https://cdn-icons-png.flaticon.com/512/564/564619.png"><p>Unblocked</p></div>
        <div class="app" onclick="openApp('https://scratch.mit.edu')"><img src="https://cdn-icons-png.flaticon.com/512/179/179379.png"><p>Scratch</p></div>
        <div class="app" onclick="openApp('https://poki.com')"><img src="https://cdn-icons-png.flaticon.com/512/2163/2163666.png"><p>Poki</p></div>
        <div class="app" onclick="openApp('https://code.org')"><img src="https://cdn-icons-png.flaticon.com/512/888/888879.png"><p>Code.org</p></div>
      </div>
      <!-- Add more pages as needed -->
    </div>
  </div>

  <!-- Settings -->
  <div id="settingsWindow" class="window" style="display:none;">
    <div class="window-bar"><span>Settings</span><button onclick="settingsWindow.style.display='none'">X</button></div>
    <div style="padding:20px;"><button onclick="toggleFullscreen()">Fullscreen</button></div>
  </div>

  <!-- Spotify Widget -->
  <div id="spotifyWidget">
    <iframe id="spotifyFrame" src="https://open.spotify.com/embed/track/5qmq61DAAOUa5ZDG1j4N4H" width="300" height="380" frameborder="0" allowtransparency="true" allow="encrypted-media"></iframe>
  </div>

  <!-- Taskbar -->
  <div id="taskbar">
    <div id="taskbar-icons">
      <img src="https://cdn-icons-png.flaticon.com/512/732/732221.png" onclick="openSettings()">
      <img src="https://cdn-icons-png.flaticon.com/512/841/841364.png" onclick="openBrowser()">
      <img src="https://cdn-icons-png.flaticon.com/512/1828/1828919.png" onclick="openAndroid()">
    </div>
  </div>

</div>

<script>
/* Boot Animation */
const bootAnimation = document.getElementById("bootAnimation");
const desktop = document.getElementById("desktop");
const bootLogo = document.getElementById("bootLogo");
const bootText = document.getElementById("bootText");
const logos = [
  {src:"https://upload.wikimedia.org/wikipedia/commons/3/3f/Arch_Linux_Logo.svg", text:"Arch Linux"},
  {src:"https://upload.wikimedia.org/wikipedia/commons/f/fa/MacOS_logo.svg", text:"macOS"},
  {src:"https://upload.wikimedia.org/wikipedia/commons/5/5f/Windows_logo_-_2021.svg", text:"Windows"},
  {src:"data:image/jpeg;base64,/9j/4AAQSk...", text:"Code Running"}
];
let currentLogo=0;
function nextLogo(){
  if(currentLogo>=logos.length){
    bootAnimation.style.display="none";
    lockScreen.style.display="flex";
    return;
  }
  bootLogo.src=logos[currentLogo].src;
  bootText.textContent=logos[currentLogo].text;
  currentLogo++;
  setTimeout(nextLogo,1500);
}
nextLogo();

/* Clock */
const time=document.getElementById("time");
const date=document.getElementById("date");
function updateClock(){ const now=new Date(); time.textContent=now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}); date.textContent=now.toLocaleDateString(); }
setInterval(updateClock,1000); updateClock();

/* Lock Screen Clock */
const lockTime=document.getElementById("lockTime");
const lockDate=document.getElementById("lockDate");
function updateLockClock(){ const now=new Date(); lockTime.textContent=now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}); lockDate.textContent=now.toLocaleDateString(); }
setInterval(updateLockClock,1000); updateLockClock();

/* Browser */
const browserWindow=document.getElementById("browserWindow");
const browserFrame=document.getElementById("browserFrame");
function openBrowser(){ browserWindow.style.display="flex"; }
function closeBrowser(){ browserWindow.style.display="none"; }
function openApp(url){ browserFrame.src=url; openBrowser(); }
const searchBar=document.getElementById("searchBar");
searchBar.addEventListener("keydown", e=>{
  if(e.key==='Enter'){ let val=e.target.value; if(!val.startsWith('http')) val='https://www.google.com/search?q='+encodeURIComponent(val); browserFrame.src=val; }
});

/* Android */
const androidWindow=document.getElementById("androidWindow");
function openAndroid(){ androidWindow.style.display="flex"; }
function closeAndroid(){ androidWindow.style.display="none"; }

/* Settings */
const settingsWindow=document.getElementById("settingsWindow");
function openSettings(){ settingsWindow.style.display="flex"; }
function toggleFullscreen(){ document.documentElement.requestFullscreen(); }

/* Lock Screen Password */
const lockScreen = document.getElementById("lockScreen");
const passwordInput = document.getElementById("passwordInput");
const wrongPassword = document.getElementById("wrongPassword");
const correctPassword = "1234"; // set your password
function checkPassword(){ 
  if(passwordInput.value===correctPassword){ lockScreen.style.display="none"; desktop.style.display="block"; } 
  else { wrongPassword.style.display="block"; } 
}

/* Cloak */
document.title="Google Classroom";
</script>
</body>
</html>
