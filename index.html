<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Scarz OS</title>

<style>
body,html{margin:0;padding:0;overflow:hidden;font-family:'Courier New',monospace;background:black}

/* BOOT */
#bootScreen{
color:#00ff00;background:black;height:100vh;
display:flex;justify-content:center;align-items:center;
font-size:2em;position:absolute;width:100%;z-index:9999;
}

/* LOCK */
#lockScreen{
display:none;height:100vh;width:100%;
background:black;color:white;
display:flex;flex-direction:column;
justify-content:center;align-items:center;
}
#time{font-size:3em;margin-bottom:20px}

/* DESKTOP */
#desktop{
display:none;height:100vh;width:100%;
background-size:cover;background-position:center;
position:relative;
}

/* TASKBAR */
#taskbar{
position:absolute;bottom:10px;left:50%;
transform:translateX(-50%);
background:rgba(255,255,255,0.2);
backdrop-filter:blur(20px);
border-radius:25px;padding:10px;
display:flex;gap:15px;
}
.icon{cursor:pointer;font-size:24px;filter:grayscale(100%)}
.icon:hover{filter:grayscale(0%)}

/* WINDOWS */
.window{
position:absolute;background:#111;color:white;
border-radius:10px;display:none;
box-shadow:0 0 20px black;
}
.header{
background:black;padding:5px;cursor:move;
display:flex;justify-content:space-between;
}

/* ANDROID */
#androidApps{
display:grid;grid-template-columns:repeat(3,1fr);
gap:10px;padding:10px;max-height:300px;overflow:auto;
}
.appBtn{background:#222;padding:10px;text-align:center;cursor:pointer}

/* WIDGETS */
.widget{
position:absolute;background:rgba(0,0,0,0.6);
padding:10px;border-radius:10px;
}
</style>
</head>

<body>

<!-- BOOT -->
<div id="bootScreen">
<span id="bootText"></span><span id="cursor">_</span>
</div>

<!-- LOCK -->
<div id="lockScreen">
<div id="time"></div>
<input id="pin" type="password" placeholder="PIN">
<button onclick="unlock()">Unlock</button>
</div>

<!-- DESKTOP -->
<div id="desktop">

<!-- WIDGETS -->
<div class="widget" style="top:20px;left:20px" id="cpu">CPU: 10%</div>
<div class="widget" style="top:20px;left:150px" id="ram">RAM: 20%</div>
<div class="widget" style="top:120px;left:20px">Spotify 🎧</div>
<div class="widget" style="top:120px;left:150px">PS5 🎮</div>

<!-- TASKBAR -->
<div id="taskbar">
<div class="icon" onclick="openWin('android')">🤖</div>
<div class="icon" onclick="openWin('proxy')">🌐</div>
<div class="icon" onclick="openWin('games')">🎮</div>
<div class="icon" onclick="pickWallpaper()">⚙️</div>
<div class="icon" onclick="panic()">⚠️</div>
</div>

<!-- ANDROID -->
<div id="android" class="window" style="width:300px;height:400px;top:50px;left:50px">
<div class="header">Android <span onclick="closeWin('android')">X</span></div>
<div id="androidApps">
<div class="appBtn" onclick="openWin('proxy')">Proxy/VPN</div>
<div class="appBtn" onclick="openWin('games')">Games</div>
<div class="appBtn">Netflix</div>
<div class="appBtn">Spotify</div>
<div class="appBtn">Roblox</div>
<div class="appBtn">PS5 Emulator</div>
<div class="appBtn">Xbox Emulator</div>
<div class="appBtn">Arch Linux</div>
<div class="appBtn">ChatGPT</div>
<div class="appBtn">YouTube</div>
</div>
</div>

<!-- PROXY -->
<div id="proxy" class="window" style="width:500px;height:400px;top:80px;left:80px">
<div class="header">Proxy/VPN <span onclick="closeWin('proxy')">X</span></div>
<input id="url" placeholder="Enter URL" style="width:90%">
<button onclick="go()">Go</button>
<iframe id="frame" style="width:100%;height:300px"></iframe>
</div>

<!-- GAMES -->
<div id="games" class="window" style="width:400px;height:300px;top:100px;left:100px">
<div class="header">Game Hub <span onclick="closeWin('games')">X</span></div>
<ul>
<li><a href="https://example.com" target="_blank">Unblocked Games</a></li>
<li><a href="https://example.com" target="_blank">More Games</a></li>
</ul>
</div>

</div>

<input type="file" id="wallpaper" style="display:none">

<script>
// BOOT
let text="Booting Scarz OS";
let i=0;
function boot(){
if(i<text.length){
bootText.innerHTML+=text[i];
i++;setTimeout(boot,100);
}else{
setInterval(()=>cursor.style.visibility=
cursor.style.visibility=="hidden"?"visible":"hidden",500);
setTimeout(()=>{
bootScreen.style.display="none";
lockScreen.style.display="flex";
},1500);
}
}
boot();

// TIME
setInterval(()=>{
let d=new Date();
time.innerHTML=d.getHours()+":"+d.getMinutes().toString().padStart(2,'0');
},1000);

// UNLOCK
function unlock(){
if(pin.value=="1234"){
lockScreen.style.display="none";
desktop.style.display="block";
}
}

// WINDOWS
function openWin(id){document.getElementById(id).style.display="block";}
function closeWin(id){document.getElementById(id).style.display="none";}

// PROXY
function go(){
let u=url.value;
let p="https://corsproxy.io/?";
frame.src=p+encodeURIComponent(u);
}

// WALLPAPER
function pickWallpaper(){wallpaper.click();}
wallpaper.onchange=e=>{
let f=URL.createObjectURL(e.target.files[0]);
desktop.style.backgroundImage=`url(${f})`;
}

// CPU RAM
setInterval(()=>{
cpu.innerHTML="CPU: "+(Math.random()*50|0)+"%";
ram.innerHTML="RAM: "+(Math.random()*70|0)+"%";
},2000);

// PANIC
function panic(){
document.title="IXL | Math";
}

// DRAG
document.querySelectorAll(".header").forEach(h=>{
let win=h.parentElement;
h.onmousedown=e=>{
let x=e.clientX,y=e.clientY;
document.onmousemove=e2=>{
win.style.left=win.offsetLeft+(e2.clientX-x)+"px";
win.style.top=win.offsetTop+(e2.clientY-y)+"px";
x=e2.clientX;y=e2.clientY;
}
document.onmouseup=()=>document.onmousemove=null;
}
});
</script>

</body>
</html>
