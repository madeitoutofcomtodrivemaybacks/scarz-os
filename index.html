<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Scarz OS Ultimate</title>

<style>
body { margin:0; background:black; color:white; font-family:sans-serif; overflow:hidden; }

/* BOOT */
#boot {
  position:fixed; width:100%; height:100%;
  background:black; display:flex;
  justify-content:center; align-items:center;
  font-size:30px; z-index:9999;
}

/* LOCK */
#lock {
  position:fixed; width:100%; height:100%;
  background:black; display:none;
  flex-direction:column; justify-content:center; align-items:center;
  z-index:9998;
}

/* CLOCK */
.clock { position:fixed; top:10px; right:20px; color:#0ff; }

/* LAUNCHER */
.launcher {
  position:absolute; top:80px; left:50px;
  width:320px; background:#111; border-radius:20px;
}
.search { width:100%; padding:10px; background:#222; color:white; border:none; }
.apps { display:flex; flex-wrap:wrap; gap:10px; padding:10px; }
.icon { width:60px; cursor:pointer; }

/* WINDOWS */
.window {
  position:absolute;
  width:500px; height:300px;
  background:#111; border:1px solid #444;
  display:none; resize:both; overflow:hidden;
}
.header {
  background:#222; padding:5px;
  display:flex; justify-content:space-between;
  cursor:move;
}
iframe { width:100%; height:85%; border:none; }

/* TERMINAL */
#terminalOutput { height:80%; overflow:auto; font-family:monospace; }
</style>
</head>

<body>

<audio id="bootSound" src="https://www.myinstants.com/media/sounds/windows-xp-startup.mp3"></audio>

<div id="boot">Scarz OS Booting...</div>

<div id="lock">
  <h1>Scarz OS</h1>
  <input type="password" id="pass">
  <button onclick="unlock()">Unlock</button>
</div>

<div class="clock" id="clock"></div>

<!-- LAUNCHER -->
<div class="launcher">
  <input class="search" placeholder="Search..." oninput="searchApps(this.value)">
  <div class="apps" id="apps">
    <img src="browser.png" class="icon" data-name="browser" onclick="openWin('browser')">
    <img src="ai.png" class="icon" data-name="ai" onclick="openWin('ai')">
    <img src="terminal.png" class="icon" data-name="terminal" onclick="openWin('term')">
    <img src="store.png" class="icon" data-name="store" onclick="openWin('store')">
  </div>
</div>

<!-- BROWSER -->
<div class="window" id="browser">
  <div class="header">Browser
    <div>
      <button onclick="closeWin('browser')">X</button>
    </div>
  </div>
  <input id="urlBar" placeholder="Enter URL..." style="width:100%" onkeydown="go(event)">
  <iframe id="browserFrame"></iframe>
</div>

<!-- AI -->
<div class="window" id="ai">
  <div class="header">AI Assistant</div>
  <div id="chat"></div>
  <input id="aiInput" placeholder="Ask something..." onkeydown="aiChat(event)">
</div>

<!-- TERMINAL -->
<div class="window" id="term">
  <div class="header">Terminal</div>
  <div id="terminalOutput"></div>
  <input id="cmd" onkeydown="runCmd(event)">
</div>

<!-- STORE -->
<div class="window" id="store">
  <div class="header">Game Store</div>
  <button onclick="installApp('YouTube','youtube')">Install YouTube</button>
  <button onclick="installApp('Games','games')">Install Games</button>
</div>

<script>

/* BOOT */
setTimeout(()=>{
  document.getElementById("boot").style.display="none";
  document.getElementById("lock").style.display="flex";
  document.getElementById("bootSound").play();
},2000);

/* PASSWORD */
function unlock(){
  if(document.getElementById("pass").value==="1234"){
    document.getElementById("lock").style.display="none";
  }
}

/* CLOCK */
setInterval(()=>{
  document.getElementById("clock").innerText=new Date().toLocaleTimeString();
},1000);

/* WINDOWS */
function openWin(id){
  let w=document.getElementById(id);
  w.style.display="block";
}

/* SEARCH */
function searchApps(val){
  val=val.toLowerCase();
  document.querySelectorAll(".icon").forEach(i=>{
    i.style.display=i.dataset.name.includes(val)?"block":"none";
  });
}

/* BROWSER */
function go(e){
  if(e.key==="Enter"){
    document.getElementById("browserFrame").src =
      "https://" + document.getElementById("urlBar").value;
  }
}

/* AI */
function aiChat(e){
  if(e.key==="Enter"){
    let input=e.target.value;
    let chat=document.getElementById("chat");
    chat.innerHTML+="<div>You: "+input+"</div>";
    chat.innerHTML+="<div>AI: I think '"+input+"' is interesting.</div>";
    e.target.value="";
  }
}

/* TERMINAL */
function runCmd(e){
  if(e.key==="Enter"){
    let cmd=e.target.value;
    let out=document.getElementById("terminalOutput");

    if(cmd==="help") out.innerHTML+="<div>help, time, clear</div>";
    else if(cmd==="time") out.innerHTML+="<div>"+new Date()+"</div>";
    else if(cmd==="clear") out.innerHTML="";
    else out.innerHTML+="<div>Unknown command</div>";

    e.target.value="";
  }
}

/* STORE */
function installApp(name,id){
  let apps=document.getElementById("apps");
  let img=document.createElement("img");
  img.className="icon";
  img.dataset.name=name.toLowerCase();
  img.onclick=()=>openWin(id);
  apps.appendChild(img);
}

/* SNAP WINDOWS */
document.querySelectorAll(".window").forEach(win=>{
  win.onmouseup=()=>{
    if(win.offsetLeft<50){
      win.style.width="50%";
      win.style.left="0";
    }
    if(window.innerWidth - win.offsetLeft < 50){
      win.style.width="50%";
      win.style.left="50%";
    }
  };
});

</script>

</body>
</html>
