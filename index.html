<!DOCTYPE html>
<html>
<head>
  <title>Loading...</title>

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial;
      overflow: hidden;
    }

    /* Boot */
    .boot {
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    /* MOND Clock */
    #clock {
      position:absolute;
      top:40%;
      left:50%;
      transform:translate(-50%,-50%);
      text-align:center;
    }

    #time {
      font-size:100px;
      font-weight:200;
      letter-spacing:5px;
    }

    #date {
      font-size:20px;
      opacity:0.6;
      letter-spacing:3px;
    }

    /* Taskbar */
    #taskbar {
      position:fixed;
      bottom:10px;
      left:50%;
      transform:translateX(-50%);
      width:60%;
      height:60px;
      border-radius:20px;
      backdrop-filter: blur(20px);
      background: rgba(255,255,255,0.08);
    }

    #taskbar-icons {
      position:absolute;
      left:50%;
      transform:translateX(-50%);
    }

    #taskbar-icons img {
      width:40px;
      margin:10px;
      cursor:pointer;
    }

    /* Window */
    .window {
      position:absolute;
      top:80px;
      left:100px;
      width:70%;
      height:70%;
      background:#111;
      border-radius:12px;
      display:flex;
      flex-direction:column;
    }

    .window-bar {
      background:#000;
      padding:10px;
      display:flex;
      justify-content:space-between;
    }

    iframe {
      flex:1;
      border:none;
    }

    /* Android launcher */
    #androidLauncher {
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:20px;
      padding:20px;
    }

    .app {
      text-align:center;
      cursor:pointer;
    }

    .app img {
      width:60px;
    }

  </style>
</head>

<body>

<!-- Boot -->
<div id="bootScreen" class="boot">
  <h1>Scarz OS</h1>
</div>

<!-- Desktop -->
<div id="desktop" style="display:none;">

  <!-- Clock -->
  <div id="clock">
    <div id="time"></div>
    <div id="date"></div>
  </div>

  <!-- Browser -->
  <div id="browserWindow" class="window" style="display:none;">
    <div class="window-bar">
      <span>Browser</span>
      <button onclick="closeBrowser()">X</button>
    </div>
    <iframe id="browserFrame"></iframe>
  </div>

  <!-- Android Launcher -->
  <div id="androidWindow" class="window" style="display:none;">
    <div class="window-bar">
      <span>Android</span>
      <button onclick="closeAndroid()">X</button>
    </div>

    <div id="androidLauncher">

      <div class="app" onclick="openApp('https://www.roblox.com')">
        <img src="https://cdn-icons-png.flaticon.com/512/5968/5968705.png">
        <p>Roblox</p>
      </div>

      <div class="app" onclick="openApp('https://www.tiktok.com')">
        <img src="https://cdn-icons-png.flaticon.com/512/3046/3046121.png">
        <p>TikTok</p>
      </div>

      <div class="app" onclick="openApp('https://www.youtube.com')">
        <img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png">
        <p>YouTube</p>
      </div>

      <div class="app" onclick="openApp('https://discord.com')">
        <img src="https://cdn-icons-png.flaticon.com/512/2111/2111370.png">
        <p>Discord</p>
      </div>

      <div class="app" onclick="openApp('https://chat.openai.com')">
        <img src="https://cdn-icons-png.flaticon.com/512/4712/4712109.png">
        <p>ChatGPT</p>
      </div>

    </div>
  </div>

  <!-- Settings -->
  <div id="settingsWindow" class="window" style="display:none;">
    <div class="window-bar">
      <span>Settings</span>
      <button onclick="settingsWindow.style.display='none'">X</button>
    </div>
    <div style="padding:20px;">
      <button onclick="toggleFullscreen()">Fullscreen</button>
    </div>
  </div>

  <!-- Taskbar -->
  <div id="taskbar">
    <div id="taskbar-icons">
      <img src="https://cdn-icons-png.flaticon.com/512/732/732221.png" onclick="openSettings()">
      <img src="https://cdn-icons-png.flaticon.com/512/841/841364.png" onclick="openBrowser()">
      <img src="https://cdn-icons-png.flaticon.com/512/1828/1828919.png" onclick="openAndroid()">
    </div>
  </div>

</div>

<script>

// Boot
setTimeout(()=>{
  bootScreen.style.display="none";
  desktop.style.display="block";
},1500);

// Clock
function updateClock(){
  const now=new Date();
  time.textContent=now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
  date.textContent=now.toLocaleDateString();
}
setInterval(updateClock,1000);
updateClock();

// Browser
function openBrowser(){
  browserWindow.style.display="flex";
}

function closeBrowser(){
  browserWindow.style.display="none";
}

function openApp(url){
  browserFrame.src=url;
  openBrowser();
}

// Android
function openAndroid(){
  androidWindow.style.display="flex";
}

function closeAndroid(){
  androidWindow.style.display="none";
}

// Settings
function openSettings(){
  settingsWindow.style.display="flex";
}

function toggleFullscreen(){
  document.documentElement.requestFullscreen();
}

// Cloak
document.title="Google Classroom";

</script>

</body>
</html>
