<!DOCTYPE html>
<html>
<head>
  <title>Loading...</title>
  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial;
      overflow: hidden;
    }

    /* Lockscreen */
    #lockscreen {
      position: fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background:#000;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      z-index:1000;
    }

    #lockscreen input {
      padding:10px;
      font-size:20px;
      border-radius:5px;
      border:none;
      text-align:center;
    }

    #lockscreen button {
      margin-top:10px;
      padding:10px 20px;
      font-size:18px;
      cursor:pointer;
    }

    /* Boot */
    .boot {
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    /* MOND Clock */
    #clock {
      position:absolute;
      top:40%;
      left:50%;
      transform:translate(-50%,-50%);
      text-align:center;
    }

    #time {
      font-size:100px;
      font-weight:200;
      letter-spacing:5px;
    }

    #date {
      font-size:20px;
      opacity:0.6;
      letter-spacing:3px;
    }

    /* Taskbar */
    #taskbar {
      position:fixed;
      bottom:10px;
      left:50%;
      transform:translateX(-50%);
      width:60%;
      height:60px;
      border-radius:20px;
      backdrop-filter: blur(20px);
      background: rgba(255,255,255,0.08);
      z-index:500;
    }

    #taskbar-icons {
      position:absolute;
      left:50%;
      transform:translateX(-50%);
    }

    #taskbar-icons img {
      width:40px;
      margin:10px;
      cursor:pointer;
    }

    /* Window */
    .window {
      position:absolute;
      top:80px;
      left:100px;
      width:70%;
      height:70%;
      background:#111;
      border-radius:12px;
      display:flex;
      flex-direction:column;
      z-index:400;
    }

    .window-bar {
      background:#000;
      padding:10px;
      display:flex;
      justify-content:space-between;
      cursor:move;
    }

    iframe {
      flex:1;
      border:none;
    }

    /* Android launcher */
    #androidWindowContent {
      overflow:hidden;
      flex:1;
      display:flex;
      scroll-behavior: smooth;
    }

    .androidPage {
      min-width:100%;
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:20px;
      padding:20px;
    }

    .app {
      text-align:center;
      cursor:pointer;
    }

    .app img {
      width:60px;
    }

    #dots {
      text-align:center;
      padding:10px;
    }

    .dot {
      height:10px;
      width:10px;
      margin:0 5px;
      background-color:#555;
      border-radius:50%;
      display:inline-block;
    }

    .activeDot {
      background-color:#fff;
    }

    /* Spotify Widget */
    #spotifyWidget {
      position:absolute;
      bottom:100px;
      right:30px;
      width:300px;
      height:380px;
      background:#111;
      border-radius:12px;
      overflow:hidden;
      box-shadow:0 0 20px rgba(0,0,0,0.5);
      display:flex;
      flex-direction:column;
      z-index:300;
    }

    #spotifyWidget .header {
      background:#1DB954;
      padding:10px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      font-weight:bold;
    }

    #spotifyWidget iframe {
      flex:1;
    }

    #spotifyWidget button {
      background:#111;
      color:white;
      border:none;
      cursor:pointer;
    }

    /* Browser search input */
    #browserSearch {
      flex:1;
      padding:10px;
      font-size:16px;
      border:none;
      background:#222;
      color:white;
    }
    #searchGo {
      padding:10px;
      background:#444;
      border:none;
      color:white;
      cursor:pointer;
    }

  </style>
</head>
<body>

<!-- Lockscreen -->
<div id="lockscreen">
  <h1>Enter Password</h1>
  <input type="password" id="passwordInput" placeholder="Password">
  <button onclick="checkPassword()">Unlock</button>
</div>

<!-- Boot -->
<div id="bootScreen" class="boot" style="display:none;">
  <h1>Scarz OS</h1>
</div>

<!-- Desktop -->
<div id="desktop" style="display:none;">

  <!-- Clock -->
  <div id="clock">
    <div id="time"></div>
    <div id="date"></div>
  </div>

  <!-- Browser -->
  <div id="browserWindow" class="window" style="display:none;">
    <div class="window-bar">
      <span>Browser</span>
      <button onclick="closeBrowser()">X</button>
    </div>
    <div style="display:flex; flex-direction:column; height:100%;">
      <div style="display:flex; border-bottom:1px solid #333;">
        <input type="text" id="browserSearch" placeholder="Search or type URL...">
        <button id="searchGo">Go</button>
      </div>
      <iframe id="browserFrame"></iframe>
    </div>
  </div>

  <!-- Android Launcher -->
  <div id="androidWindow" class="window" style="display:none;">
    <div class="window-bar">
      <span>Android</span>
      <button onclick="closeAndroid()">X</button>
    </div>
    <div id="androidWindowContent">
      <!-- Page 1 -->
      <div class="androidPage" id="page1">
        <div class="app" onclick="openApp('https://www.roblox.com')"><img src="https://cdn-icons-png.flaticon.com/512/5968/5968705.png"><p>Roblox</p></div>
        <div class="app" onclick="openApp('https://www.tiktok.com')"><img src="https://cdn-icons-png.flaticon.com/512/3046/3046121.png"><p>TikTok</p></div>
        <div class="app" onclick="openApp('https://www.youtube.com')"><img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png"><p>YouTube</p></div>
        <div class="app" onclick="openApp('https://discord.com')"><img src="https://cdn-icons-png.flaticon.com/512/2111/2111370.png"><p>Discord</p></div>
      </div>
      <!-- Page 2 -->
      <div class="androidPage" id="page2">
        <div class="app" onclick="openApp('https://chat.openai.com')"><img src="https://cdn-icons-png.flaticon.com/512/4712/4712109.png"><p>ChatGPT</p></div>
        <div class="app"><img src="https://cdn-icons-png.flaticon.com/512/732/732221.png"><p>Extra1</p></div>
        <div class="app"><img src="https://cdn-icons-png.flaticon.com/512/732/732221.png"><p>Extra2</p></div>
      </div>
    </div>
    <div id="dots">
      <span class="dot activeDot"></span>
      <span class="dot"></span>
    </div>
  </div>

  <!-- Settings -->
  <div id="settingsWindow" class="window" style="display:none;">
    <div class="window-bar">
      <span>Settings</span>
      <button onclick="settingsWindow.style.display='none'">X</button>
    </div>
    <div style="padding:20px;">
      <button onclick="toggleFullscreen()">Fullscreen</button>
    </div>
  </div>

  <!-- Spotify Widget -->
  <div id="spotifyWidget">
    <div class="header">
      <span>Spotify</span>
      <button onclick="minimizeSpotify()">—</button>
    </div>
    <iframe id="spotifyFrame" src="https://open.spotify.com/embed/playlist/37i9dQZF1DXcBWIGoYBM5M" allowtransparency="true" allow="encrypted-media"></iframe>
  </div>

  <!-- Taskbar -->
  <div id="taskbar">
    <div id="taskbar-icons">
      <img src="https://cdn-icons-png.flaticon.com/512/732/732221.png" onclick="openSettings()">
      <img src="https://cdn-icons-png.flaticon.com/512/841/841364.png" onclick="openBrowser()">
      <img src="https://cdn-icons-png.flaticon.com/512/1828/1828919.png" onclick="openAndroid()">
      <img src="https://cdn-icons-png.flaticon.com/512/2111/2111624.png" onclick="toggleSpotifyWidget()">
    </div>
  </div>
</div>

<script>
// Password
const PASSWORD="1234";
function checkPassword(){
  const input = document.getElementById('passwordInput').value;
  if(input===PASSWORD){
    document.getElementById('lockscreen').style.display="none";
    boot();
  } else alert("Wrong password!");
}

// Boot
function boot(){
  bootScreen.style.display="flex";
  setTimeout(()=>{
    bootScreen.style.display="none";
    desktop.style.display="block";
  },1500);
}

// Clock
function updateClock(){
  const now=new Date();
  time.textContent=now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
  date.textContent=now.toLocaleDateString();
}
setInterval(updateClock,1000);
updateClock();

// Browser
const blockedSites=["https://www.tiktok.com","https://discord.com"];
const searchInput = document.getElementById("browserSearch");
const goButton = document.getElementById("searchGo");

function openBrowser(){ browserWindow.style.display="flex"; if(browserFrame.src) searchInput.value = browserFrame.src;}
function closeBrowser(){ browserWindow.style.display="none";}

function loadBrowserURL(query){
  query = query.trim();
  if(!query) return;
  if(!query.startsWith("http")) query = "https://www.google.com/search?q="+encodeURIComponent(query);
  let finalURL = blockedSites.some(site=>query.includes(site)) ? "https://api.allorigins.win/raw?url="+encodeURIComponent(query) : query;
  browserFrame.src = finalURL;
}

searchInput.addEventListener("keydown", e=>{if(e.key==="Enter") loadBrowserURL(searchInput.value);});
goButton.addEventListener("click", ()=>loadBrowserURL(searchInput.value));
function openApp(url){ loadBrowserURL(url); openBrowser(); }

// Android
let currentPage=0;
const pages=document.querySelectorAll(".androidPage");
const dots=document.querySelectorAll(".dot");

function showPage(index){
  const container=document.getElementById("androidWindowContent");
  container.scrollLeft=index*container.clientWidth;
  currentPage=index;
  dots.forEach((d,i)=>d.classList.toggle("activeDot", i===index));
}

function openAndroid(){ androidWindow.style.display="flex"; showPage(currentPage);}
function closeAndroid(){ androidWindow.style.display="none";}

// Swipe detection
let startX=null;
const androidContent=document.getElementById("androidWindowContent");
androidContent.addEventListener("touchstart",e=>startX=e.touches[0].clientX);
androidContent.addEventListener("touchend",e=>{
  if(startX===null)return;
  const endX=e.changedTouches[0].clientX;
  if(endX-startX>50) showPage(Math.max(0,currentPage-1));
  if(startX-endX>50) showPage(Math.min(pages.length-1,currentPage+1));
  startX=null;
});

// Settings
function openSettings(){ settingsWindow.style.display="flex";}
function toggleFullscreen(){ document.documentElement.requestFullscreen();}

// Draggable windows
const draggableWindows=document.querySelectorAll(".window");
draggableWindows.forEach(win=>{
  const bar=win.querySelector(".window-bar");
  let offsetX, offsetY, dragging=false;
  bar.onmousedown=e=>{
    dragging=true;
    offsetX=e.clientX-win.offsetLeft;
    offsetY=e.clientY-win.offsetTop;
  };
  document.onmouseup=()=>dragging=false;
  document.onmousemove=e=>{
    if(!dragging) return;
    win.style.left=(e.clientX-offsetX)+"px";
    win.style.top=(e.clientY-offsetY)+"px";
  };
});

// Spotify widget
const spotifyWidget = document.getElementById("spotifyWidget");
let draggingSpotify=false, offsetXSpotify, offsetYSpotify;
spotifyWidget.onmousedown=function(e){
  if(e.target.tagName==="BUTTON") return;
  draggingSpotify=true;
  offsetXSpotify = e.clientX - spotifyWidget.offsetLeft;
  offsetYSpotify = e.clientY - spotifyWidget.offsetTop;
};
document.onmouseup = function(){ draggingSpotify=false; };
document.onmousemove = function(e){
  if(!draggingSpotify) return;
  spotifyWidget.style.left = (e.clientX - offsetXSpotify)+"px";
  spotifyWidget.style.top = (e.clientY - offsetYSpotify)+"px";
};

function minimizeSpotify(){ spotifyWidget.style.display="none";}
function toggleSpotifyWidget(){ spotifyWidget.style.display = (spotifyWidget.style.display==="none"||!spotifyWidget.style.display)?"flex":"none"; }

document.title="Google Classroom";
</script>

</body>
</html>
