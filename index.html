<!DOCTYPE html>
<html>
<head>
  <title>Loading...</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="boot">

<div id="bootScreen">
  <h1>Scarz OS</h1>
  <p>Booting...</p>
</div>

<div id="osSelect" style="display:none;">
  <h2>Select OS</h2>
  <button onclick="bootOS()">Scarz OS Desktop</button>
</div>

<script>
setTimeout(() => {
  document.getElementById("bootScreen").style.display = "none";
  document.getElementById("osSelect").style.display = "block";
}, 2000);

function bootOS() {
  window.location.href = "desktop.html";
}
</script>

</body>
</html>
